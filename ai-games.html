<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>AI小游戏 · 码芽</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="跟4个用Python写的AI小游戏互动：AI猜数字、聊天机器人、会学习的石头剪刀布、迷你神经元，边玩边理解AI是怎么工作的。" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%B1%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="entry-switch">
        <a href="course.html">🌱 初级</a>
        <a href="assessment.html">⚡ 进阶</a>
        <a href="advanced.html">🚀 高级</a>
        <a href="debug.html">🐛 调试挑战</a>
        <span class="entry-switch-current">🎮 AI小游戏</span>
        <a href="index.html?review=1">📝 复习</a>
        <a href="certificate.html">🎓 证书</a>
        <a href="leaderboard.html">🏆 排行榜</a>
        <a href="index.html">🔄 重新测试</a>
      </div>
      <h1>🎮 AI 小游戏</h1>
      <div id="streak-badge" class="streak-badge hidden"></div>
      <div id="level-list" class="level-list"></div>
      <div class="sync-row">
        <button id="export-progress-btn" class="sync-btn">📤 导出进度码</button>
        <button id="import-progress-btn" class="sync-btn">📥 导入进度码</button>
      </div>
      <div class="account-box">
        <button id="account-toggle-btn" class="account-avatar-btn">
          <span id="account-avatar" class="account-avatar">👤</span>
          <span id="account-avatar-label" class="account-avatar-label">登录 / 注册</span>
        </button>
        <div id="account-panel" class="account-panel hidden">
          <div id="account-logged-out">
            <input id="account-username" type="text" placeholder="用户名（随便起）" autocomplete="off" />
            <input id="account-password" type="password" placeholder="密码（至少6位）" autocomplete="off" />
            <div class="account-btn-row">
              <button id="account-signup-btn">注册</button>
              <button id="account-login-btn" class="secondary">登录</button>
            </div>
          </div>
          <div id="account-logged-in" class="hidden">
            <p id="account-status" class="account-status"></p>
            <div class="account-btn-row">
              <button id="account-sync-btn">☁️ 立即同步</button>
              <button id="account-logout-btn" class="secondary">退出登录</button>
            </div>
          </div>
          <div id="account-message" class="account-message"></div>
        </div>
      </div>
      <div class="sidebar-footer"><a href="about.html">关于</a><span>·</span><a href="privacy.html">隐私政策</a></div>
    </aside>

    <main class="content">
      <div id="loading" class="loading">
        <p id="loading-text">Python 运行环境加载中，第一次打开会花几秒钟...</p>
        <button id="loading-retry-btn" class="loading-retry-btn hidden">重新加载</button>
      </div>

      <div id="level-view" class="level-view hidden">
        <h2 id="level-title"></h2>
        <div id="level-explain" class="explain"></div>

        <button id="code-toggle-btn" class="secondary code-toggle-btn">▶ 查看代码</button>
        <div id="code-section" class="code-section hidden">
          <textarea id="code-editor" spellcheck="false"></textarea>
          <div id="hint-box" class="hint-box hidden"></div>
          <div id="walkthrough-box" class="walkthrough-box hidden"></div>
          <div class="button-row">
            <button id="hint-btn" class="secondary">💡 提示</button>
            <button id="walkthrough-btn" class="secondary hidden">🔍 逐行解读</button>
            <button id="reset-code-btn" class="secondary">重置代码</button>
            <button id="save-btn" class="secondary">💾 保存</button>
          </div>
        </div>

        <div class="game-panel">
          <div class="editor-label">游戏</div>
          <pre id="terminal-box" class="output-box terminal-box"></pre>
          <div id="turn-input-row" class="turn-input-row hidden">
            <input id="turn-input" type="text" autocomplete="off" placeholder="在这里输入，回车发送" />
            <button id="turn-send-btn">发送</button>
          </div>
          <div class="button-row">
            <button id="start-game-btn">▶ 开始游戏</button>
            <button id="restart-game-btn" class="secondary hidden">🔄 重新开始</button>
            <button id="clear-chat-btn" class="secondary hidden">🧹 清空对话</button>
          </div>
          <div id="game-feedback" class="feedback-box"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
  <script src="ai-games-levels.js"></script>
  <script src="ai-games-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="progress-sync.js"></script>
</body>
</html>
