<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>初级 · 码芽</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="12关新手课程，从print()学到自己写出一个猜数字小游戏，每一关都有实时反馈。" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%B1%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="entry-switch">
        <span class="entry-switch-current">🌱 初级</span>
        <a href="assessment.html">⚡ 进阶</a>
        <a href="advanced.html">🚀 高级</a>
        <a href="debug.html">🐛 调试挑战</a>
        <a href="ai-games.html">🎮 AI小游戏</a>
        <a href="index.html?review=1">📝 复习</a>
        <a href="index.html">🔄 重新测试</a>
      </div>
      <h1>🌱 码芽</h1>
      <div id="progress-summary" class="progress-summary"></div>
      <div id="level-list" class="level-list"></div>
      <button id="reset-progress-btn" class="reset-progress-btn">重置进度</button>
      <div class="sync-row">
        <button id="export-progress-btn" class="sync-btn">📤 导出进度码</button>
        <button id="import-progress-btn" class="sync-btn">📥 导入进度码</button>
      </div>
      <div class="account-box">
        <button id="account-toggle-btn" class="sync-btn account-toggle-btn">🔐 账号同步</button>
        <div id="account-panel" class="account-panel hidden">
          <div id="account-logged-out">
            <input id="account-username" type="text" placeholder="用户名（随便起）" autocomplete="off" />
            <input id="account-password" type="password" placeholder="密码（至少6位）" autocomplete="off" />
            <div class="account-btn-row">
              <button id="account-signup-btn">注册</button>
              <button id="account-login-btn" class="secondary">登录</button>
            </div>
          </div>
          <div id="account-logged-in" class="hidden">
            <p id="account-status" class="account-status"></p>
            <div class="account-btn-row">
              <button id="account-sync-btn">☁️ 立即同步</button>
              <button id="account-logout-btn" class="secondary">退出登录</button>
            </div>
          </div>
          <div id="account-message" class="account-message"></div>
        </div>
      </div>
      <div class="sidebar-footer"><a href="about.html">关于</a><span>·</span><a href="privacy.html">隐私政策</a></div>
    </aside>

    <main class="content">
      <div id="loading" class="loading">
        <p id="loading-text">Python 运行环境加载中，第一次打开会花几秒钟...</p>
        <button id="loading-retry-btn" class="loading-retry-btn hidden">重新加载</button>
      </div>

      <div id="level-view" class="level-view hidden">
        <h2 id="level-title"></h2>
        <div id="level-explain" class="explain"></div>

        <div class="editor-row">
          <div class="editor-col">
            <div class="editor-label">你的代码</div>
            <textarea id="code-editor" spellcheck="false"></textarea>
            <div id="input-row" class="input-row hidden">
              <label class="editor-label">模拟输入（每行一个，对应一次 input()）</label>
              <textarea id="input-editor" rows="3" spellcheck="false"></textarea>
            </div>
            <div class="button-row">
              <button id="run-btn">▶ 运行</button>
              <button id="reset-btn" class="secondary">重置代码</button>
              <button id="hint-btn" class="secondary">💡 提示</button>
              <button id="why-btn" class="secondary hidden">🤔 为什么</button>
              <button id="save-btn" class="secondary">💾 保存</button>
            </div>
            <div id="hint-box" class="hint-box hidden"></div>
            <div id="why-box" class="why-box hidden"></div>
          </div>

          <div class="output-col">
            <div class="editor-label">输出结果</div>
            <pre id="output-box" class="output-box"></pre>
            <div id="feedback-box" class="feedback-box"></div>
            <button id="next-level-btn" class="next-level-btn hidden">下一关 →</button>
            <div id="completion-summary" class="completion-summary hidden"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
  <script>const TRACK = "course";</script>
  <script src="levels.js"></script>
  <script src="app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="progress-sync.js"></script>
</body>
</html>
