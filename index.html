<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>水平测试 · 码芽</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="先做几道选择题，看看你现在的编程水平，推荐最适合你的学习起点：初级、进阶或高级。" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%B1%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="corner-account account-box">
    <button id="account-toggle-btn" class="account-avatar-btn">
      <span id="account-avatar" class="account-avatar">👤</span>
      <span id="account-avatar-label" class="account-avatar-label">登录 / 注册</span>
    </button>
    <div id="account-panel" class="account-panel hidden">
      <div id="account-logged-out">
        <input id="account-username" type="text" placeholder="用户名（随便起）" autocomplete="off" />
        <input id="account-password" type="password" placeholder="密码（至少6位）" autocomplete="off" />
        <div class="account-btn-row">
          <button id="account-signup-btn">注册</button>
          <button id="account-login-btn" class="secondary">登录</button>
        </div>
      </div>
      <div id="account-logged-in" class="hidden">
        <p id="account-status" class="account-status"></p>
        <div class="account-btn-row">
          <button id="account-sync-btn">☁️ 立即同步</button>
          <button id="account-logout-btn" class="secondary">退出登录</button>
        </div>
      </div>
      <div id="account-message" class="account-message"></div>
    </div>
  </div>

  <div class="landing">
    <div class="landing-inner">
      <svg class="site-logo" width="56" height="56" viewBox="0 0 56 56" fill="none" role="img" aria-label="码芽">
        <circle cx="28" cy="28" r="27" fill="var(--panel)" stroke="var(--border)" stroke-width="1" />
        <path d="M28 40 L28 24" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" />
        <path d="M28 26 C20 26, 16 20, 18 14 C24 14, 28 20, 28 26 Z" fill="var(--accent)" />
        <path d="M28 30 C36 30, 40 24, 38 18 C32 18, 28 24, 28 30 Z" fill="var(--accent)" />
      </svg>
      <div id="quiz-root"></div>
    </div>
  </div>

  <footer class="site-footer">
    <a href="about.html">关于</a>
    <span class="site-footer-dot">·</span>
    <a href="privacy.html">隐私政策</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="progress-sync.js"></script>
  <script src="quiz.js"></script>
  <script src="quiz-intermediate.js"></script>
  <script src="quiz-advanced.js"></script>
  <script src="quiz-app.js"></script>
</body>
</html>
