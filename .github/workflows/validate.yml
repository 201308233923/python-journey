name: validate

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: JS syntax check
        run: |
          js_status=0
          for f in $(find . -name "*.js" -not -path "./.git/*"); do
            node --check "$f" || js_status=1
          done
          exit $js_status

      - name: HTML tag-balance check
        run: python3 scripts/check_html_balance.py

      - name: Quiz + level data regression check
        run: node scripts/verify.mjs
